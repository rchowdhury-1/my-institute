name: API Tests

on:
  # WARNING: this suite runs against PRODUCTION and creates real sessions using
  # the seeded test student (rizwantest). The specs have no afterEach teardown,
  # so any FAILED test leaves its session orphaned in the live admin dashboard.
  # The scheduled run had been failing 100% for weeks, littering production daily.
  # Auto + scheduled triggers disabled 2026-07-03. Re-enable ONLY after the suite
  # is (a) pointed at a non-production backend and (b) given fail-safe cleanup.
  workflow_dispatch: {} # manual trigger only

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Warm up backend (Render cold start mitigation)
        run: |
          echo "Pinging /health to wake backend from cold start..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://my-institute-sxjs.onrender.com/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend warm. Proceeding."
              exit 0
            fi
            sleep 5
          done
          echo "Backend still cold after 5 attempts. Proceeding anyway."

      - name: Run API tests against production
        env:
          API_URL: https://my-institute-sxjs.onrender.com
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: npx playwright test e2e/reschedule-and-buffer.spec.ts --reporter=github
