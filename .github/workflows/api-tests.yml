name: API Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 8 * * *' # Daily at 8 AM UTC

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check test credentials are configured
        env:
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: |
          if [ -z "$TEST_ADMIN_EMAIL" ] || [ -z "$TEST_ADMIN_PASSWORD" ]; then
            echo "::error::TEST_ADMIN_EMAIL / TEST_ADMIN_PASSWORD repository secrets are not set."
            echo "::error::Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Credentials configured."

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Warm up backend (Render cold start mitigation)
        run: |
          echo "Pinging /health to wake backend from cold start..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://my-institute-sxjs.onrender.com/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend warm. Proceeding."
              exit 0
            fi
            sleep 5
          done
          echo "Backend still cold after 5 attempts. Proceeding anyway."

      - name: Run API tests against production
        env:
          API_URL: https://my-institute-sxjs.onrender.com
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
        run: npx playwright test e2e/reschedule-and-buffer.spec.ts --reporter=github
